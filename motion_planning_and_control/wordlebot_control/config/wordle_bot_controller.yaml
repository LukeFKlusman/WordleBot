wordle_bot_control_node:
  ros__parameters:
    # Generic MTC solution target for utility MTC tasks. This is a target
    # solution count, not a strict minimum required to continue.
    mtc_default_solution_target_count: 10

    # Working pose used after pick-and-place batches and direct return-to-working.
    # Joint angles are in radians.
    working_joints:
      shoulder_pan_joint:   0.5236
      shoulder_lift_joint: -2.0071
      elbow_joint:          0.8901
      wrist_1_joint:       -0.4887
      wrist_2_joint:       -1.5184
      wrist_3_joint:       -1.0647

    # Scan-and-sweep poses in world frame.
    # Pose format: [x, y, z, roll, pitch, yaw] in metres/radians.
    scan_sweep_dwell_time: 1.5
    scan_sweep_pose_0: [-0.25, 0.100, 0.1, 3.14159, -0.1745, 3.14159]
    scan_sweep_pose_1: [-0.25, 0.325, 0.1, 3.14159, -0.1745, 3.14159]
    scan_sweep_pose_2: [-0.25, 0.325, 0.1, 3.14159, -0.1745, 1.5708 ]
    scan_sweep_pose_3: [ 0.25, 0.325, 0.1, 3.14159, -0.1745, 1.5708 ]
    scan_sweep_pose_4: [ 0.25, 0.325, 0.1, 3.14159, -0.1745, 0.0    ]
    scan_sweep_pose_5: [ 0.25, 0.100, 0.1, 3.14159, -0.1745, 0.0    ]

    # Pick-and-place MTC task tuning. Solution target count is passed to
    # task.plan(N); the task still proceeds if at least one valid solution exists.
    pick_place:
      # move_group: exact-pose sequential MoveGroupInterface backend.
      # mtc: existing plan-all-then-execute-all MoveIt Task Constructor backend.
      backend: "move_group"
      task_solution_target_count: 10
      grasp_max_ik_solutions: 32
      place_max_ik_solutions: 32
      grasp_min_solution_distance: 0.10
      place_min_solution_distance: 0.10
      grasp_angle_delta: 0.261799
      cartesian_step_size: 0.001
      retreat_min_fraction: 0.0
      move_to_pick_timeout: 0.20
      move_to_place_timeout: 0.20
      solution_wrist_spin_weight: 4.0
      solution_wrist_spin_reject_threshold: 7.0
      accept_solution_score_threshold: 25.0
      place_yaw_tolerance: 0.0872665
      place_yaw_penalty_weight: 100.0
      approach_min_distance: 0.05
      approach_max_distance: 0.15
      lift_min_distance: 0.05
      lift_max_distance: 0.15
      retreat_min_distance: 0.03
      retreat_max_distance: 0.15
      grasp_z_offset: 0.01
      mgi_pre_pick_distance: 0.05
      mgi_lift_distance: 0.01
      mgi_pre_place_distance: 0.01
      mgi_retreat_distance: 0.05
      mgi_cartesian_min_fraction: 0.95
      mgi_place_open_recovery_yaw_delta: 1.5708
      gripper_open_operational_width: 0.075    # metres — operational open position for pick/place
      gripper_closed_operational_width: 0.0495 # metres — operational closed position for pick/place

    # Velocity scaling profiles and proximity-based selection thresholds.
    # All values are scaling factors in [0.0, 1.0] applied to each joint's
    # hardware velocity and acceleration limits before trajectory time-parameterisation.
    #
    # scan    — slow, smooth Cartesian motion for camera stability during scan-and-sweep
    # precise — Cartesian approach / lift / retreat near tiles and objects
    # transit — free-space OMPL moves when the robot is clear of obstacles
    #
    # proximity.near_threshold: distance (m) at or below which transit moves use precise scaling
    # proximity.far_threshold:  distance (m) at or above which transit moves use full transit scaling
    # Between the two thresholds the scaling is linearly interpolated.
    velocity_scaling:
      scan:
        velocity: 0.05
        acceleration: 0.01
      precise:
        velocity: 0.30
        acceleration: 0.15
      transit:
        velocity: 0.75
        acceleration: 0.35
      proximity:
        near_threshold: 0.10
        far_threshold: 0.50
