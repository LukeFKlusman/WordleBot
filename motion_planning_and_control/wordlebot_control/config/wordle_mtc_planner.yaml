wordle_bot_control_node:
  ros__parameters:
    # WordleMtcPlanner controls arm transit stages inside MoveIt Task Constructor.
    # It keeps MTC staging, but generates multiple OMPL trajectories and selects
    # the lowest joint-motion candidate.
    wordle_mtc_planner:
      candidate_plans: 5
      num_planning_attempts: 1
      goal_joint_tolerance: 0.0001
      max_velocity_scaling_factor: 1.0
      max_acceleration_scaling_factor: 1.0

      # Ordered joint vectors:
      # [shoulder_pan, shoulder_lift, elbow, wrist_1, wrist_2, wrist_3]
      ik_warm_attempts: 5
      ik_total_attempts: 10
      ik_retry_multiplier: 2
      ik_warm_start_joints: [1.1345, -1.5708, 1.5708, -1.5708, -1.5708, 1.1345]
      ik_functional_reference_joints: [1.1345, -1.5708, 1.5708, -1.5708, -1.5708, 1.1345]
      ik_functional_weights: [0.3, 0.5, 0.5, 0.5, 0.3, 0.3]
      ik_wrist_1_min: -3.141592653589793
      ik_wrist_1_max: 0.2617993877991494
      ik_movement_cost_weight: 2.0
      ik_functional_cost_weight: 0.3
