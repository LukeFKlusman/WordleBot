wordle_bot_control_node:
  ros__parameters:
    # Dwell time in seconds between each scan pose
    scan_sweep_dwell_time: 1.5

    # Six scan-and-sweep poses in the world frame.
    # Format: [x, y, z, roll, pitch, yaw]  (metres / radians)
    #
    # Execution sequence (MGI path):
    #   pose_0  — free-space moveToGoal (start position)
    #   pose_1  — Cartesian target (first sweep)
    #   pose_2  — reorientation: same XYZ as pose_1, yaw +270° (moveToGoal)
    #   pose_3  — Cartesian target (second sweep, from pose_2 orientation)
    #   pose_4  — reorientation: same XYZ as pose_3, yaw -90° again (moveToGoal)
    #   pose_5  — Cartesian target (third sweep, from pose_4 orientation)
    #
    # roll=pi points gripper straight down. All values are placeholders;
    # fill in real values after physical testing.
    scan_sweep_pose_0: [-0.30, 0.10, 0.1, 3.14159, 0.0,  0.0]
    scan_sweep_pose_1: [-0.30, 0.30, 0.1, 3.14159, 0.0,  0.0]
    scan_sweep_pose_2: [-0.30, 0.30, 0.1, 3.14159, 0.0,  1.5708]
    scan_sweep_pose_3: [ 0.30, 0.30, 0.1, 3.14159, 0.0,  1.5708]
    scan_sweep_pose_4: [ 0.30, 0.30, 0.1, 3.14159, 0.0,  0.0]
    scan_sweep_pose_5: [ 0.30, 0.10, 0.1, 3.14159, 0.0,  0.0]