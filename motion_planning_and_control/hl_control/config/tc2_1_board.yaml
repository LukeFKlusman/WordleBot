# TC2.1 — CRANE, no letters in Wordle slots (C2-like board)
#
# Grid reference (robot space):
#   spacing = 0.075 m, x = -0.45 + col*0.075, y = row*0.075
#   Wordle zone: row 3 (y=0.225), cols 4-8 (x: -0.15 to 0.15)
#
# All five letters are in outer staging cells (cols 0-2 and 10-12, row 1)
# which are safely outside the forbidden staging zone.
# Raw poses are slightly offset from the grid centres to simulate perception noise.
#
# Cell mapping:
#   C → col 0, row 1  cell_id 13  grid centre (-0.450, 0.075)
#   R → col 1, row 1  cell_id 14  grid centre (-0.375, 0.075)
